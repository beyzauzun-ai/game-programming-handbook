site_name: 🎮 Game Programming Handbook
site_description: Türkçe Oyun Programlama Dokümantasyonu
site_author: Beyza Uzun
site_url: https://beyzauzun-ai.github.io/game-programming-handbook/

repo_name: beyzauzun-ai/game-programming-handbook
repo_url: https://github.com/beyzauzun-ai/game-programming-handbook
edit_uri: edit/main/docs/

theme:
  name: material
  language: tr

  logo: assets/images/logo.png
  favicon: assets/favicon.png

  palette:

    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Açık Tema

    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Koyu Tema

  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - navigation.instant
    - navigation.tracking

    - search.highlight
    - search.suggest
    - search.share

    - content.code.copy
    - content.code.annotate
    - content.tabs.link

    - toc.follow

plugins:
  - search

markdown_extensions:

  - admonition

  - attr_list

  - md_in_html

  - tables

  - footnotes

  - pymdownx.details

  - pymdownx.superfences

  - pymdownx.highlight:
      anchor_linenums: true

  - pymdownx.inlinehilite

  - pymdownx.snippets

  - pymdownx.tabbed:
      alternate_style: true

extra:

  social:

    - icon: fontawesome/brands/github
      link: https://github.com/beyzauzun-ai

copyright: |
  © 2026 Beyza Uzun • Game Programming Handbook